<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Insight Extractor — AI-Powered Document Analysis</title>
  <meta name="description" content="Upload clinical trial reports, pitch decks, or financial filings. Get structured insights, key metrics, and a one-page summary instantly.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #0a0a0f;
      --surface: rgba(255,255,255,0.02);
      --surface-hover: rgba(99,102,241,0.06);
      --border: #1a1a2a;
      --border-hover: rgba(99,102,241,0.2);
      --text-primary: #f0f0f5;
      --text-secondary: #b0b0c0;
      --text-muted: #666;
      --text-dim: #555;
      --accent: #6366f1;
      --accent-gradient: linear-gradient(135deg, #6366f1, #7c3aed);
      --accent-glow: rgba(99,102,241,0.15);
      --danger: #ef4444;
      --radius-sm: 10px;
      --radius-md: 12px;
      --radius-lg: 16px;
    }

    body {
      font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: #e8e8ed;
      min-height: 100vh;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 3px; }

    /* ─── ANIMATIONS ─── */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .fade-in { animation: fadeIn 0.5s ease both; }
    .fade-in-d1 { animation: fadeIn 0.5s ease 0.1s both; }
    .fade-in-d2 { animation: fadeIn 0.5s ease 0.2s both; }
    .fade-in-d3 { animation: fadeIn 0.5s ease 0.3s both; }
    .fade-in-d4 { animation: fadeIn 0.5s ease 0.4s both; }

    /* ─── HEADER ─── */
    .header {
      padding: 32px 40px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--accent-gradient);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; color: #fff;
      letter-spacing: -0.5px;
    }
    .logo-text { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
    .logo-sub { font-size: 11px; color: var(--text-muted); font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }

    /* ─── MAIN ─── */
    .main { max-width: 960px; margin: 0 auto; padding: 40px; }

    /* ─── DROPZONE ─── */
    .dropzone {
      border: 2px dashed #2a2a3a;
      border-radius: var(--radius-lg);
      padding: 80px 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(255,255,255,0.01);
      margin-top: 60px;
    }
    .dropzone.drag-over {
      border-color: var(--accent);
      background: rgba(99,102,241,0.05);
    }
    .dropzone:hover { border-color: #3a3a5a; }
    .drop-icon {
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-glow), rgba(139,92,246,0.1));
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px; font-size: 28px;
    }
    .drop-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .drop-hint { font-size: 14px; color: var(--text-muted); line-height: 1.6; }

    /* ─── API KEY INPUT ─── */
    .api-key-section {
      margin-top: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .api-key-input {
      padding: 10px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid #2a2a3a;
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: 'IBM Plex Mono', 'IBM Plex Sans', monospace;
      font-size: 13px;
      width: 340px;
      outline: none;
      transition: border-color 0.2s;
    }
    .api-key-input:focus { border-color: var(--accent); }
    .api-key-input::placeholder { color: #444; }
    .api-key-label { font-size: 12px; color: #555; }
    .api-key-note {
      font-size: 11px;
      color: #444;
      text-align: center;
      margin-top: 8px;
    }
    .api-key-note a { color: var(--accent); text-decoration: none; }
    .api-key-note a:hover { text-decoration: underline; }
    .key-saved {
      font-size: 11px;
      color: #4ade80;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    /* ─── PROCESSING ─── */
    .processing {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      margin-top: 120px; gap: 24px;
    }
    .spinner {
      width: 56px; height: 56px;
      border: 3px solid #1a1a2e;
      border-top: 3px solid var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .processing-title { font-size: 16px; font-weight: 600; color: var(--text-primary); }
    .processing-sub { font-size: 13px; color: var(--text-dim); }
    .processing-file { font-size: 12px; color: #444; margin-top: 8px; }

    /* ─── ERROR ─── */
    .error-box { margin-top: 80px; text-align: center; }
    .error-icon { font-size: 48px; margin-bottom: 16px; }
    .error-text { color: var(--danger); font-size: 15px; margin-bottom: 20px; line-height: 1.6; }

    /* ─── BUTTONS ─── */
    .btn-primary {
      padding: 12px 24px;
      background: var(--accent-gradient);
      color: #fff; border: none;
      border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.3px;
      font-family: inherit;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary {
      padding: 12px 24px;
      background: transparent;
      color: #888; border: 1px solid #2a2a3a;
      border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: all 0.2s;
    }
    .btn-secondary:hover { border-color: #4a4a6a; color: #bbb; }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; }

    /* ─── RESULTS ─── */
    .results-header {
      display: flex; align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 32px; flex-wrap: wrap; gap: 16px;
    }
    .badge {
      display: inline-block; padding: 5px 14px;
      border-radius: 20px; font-size: 11px;
      font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .doc-title {
      font-size: 28px; font-weight: 800;
      letter-spacing: -0.5px; color: var(--text-primary);
      line-height: 1.2; margin-top: 8px;
    }
    .file-meta {
      display: flex; gap: 8px;
      font-size: 12px; color: var(--text-dim); margin-top: 6px;
    }
    .section-label {
      font-size: 11px; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--text-dim);
      font-weight: 700; margin-bottom: 14px;
    }
    .summary-box {
      background: var(--surface);
      border: 1px solid #1e1e2e;
      border-radius: var(--radius-md);
      padding: 24px; font-size: 15px;
      line-height: 1.8; color: var(--text-secondary);
      margin-bottom: 36px;
    }

    /* ─── METRICS GRID ─── */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px; margin-bottom: 36px;
    }
    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 20px; cursor: pointer;
      transition: all 0.2s ease;
    }
    .metric-card:hover {
      background: var(--surface-hover);
      border-color: var(--border-hover);
    }
    .metric-label {
      font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--accent);
      font-weight: 700; margin-bottom: 6px;
    }
    .metric-value {
      font-size: 24px; font-weight: 800;
      color: var(--text-primary); letter-spacing: -0.5px;
      font-variant-numeric: tabular-nums;
    }
    .metric-context { font-size: 12px; color: #777; margin-top: 8px; line-height: 1.5; }

    /* ─── FINDINGS ─── */
    .finding-row {
      display: flex; gap: 14px;
      padding: 14px 0; border-bottom: 1px solid #141420;
    }
    .finding-num {
      font-size: 13px; font-weight: 800;
      color: var(--accent); min-width: 24px; padding-top: 2px;
    }
    .finding-text { font-size: 14px; line-height: 1.7; color: var(--text-secondary); }
    .risk-icon { color: var(--danger) !important; }

    /* ─── ONE PAGER ─── */
    .one-pager {
      background: var(--surface);
      border: 1px solid #1e1e2e;
      border-radius: var(--radius-md);
      padding: 28px; font-size: 14px;
      line-height: 1.9; color: #999;
      white-space: pre-wrap; margin-bottom: 36px;
    }

    /* ─── TOAST ─── */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #1e1e2e; color: #e8e8ed;
      padding: 12px 20px; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 600;
      border: 1px solid #2a2a3a;
      opacity: 0; transition: opacity 0.3s;
      pointer-events: none; z-index: 100;
    }
    .toast.show { opacity: 1; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 640px) {
      .header { padding: 20px 20px 0; }
      .main { padding: 20px; }
      .dropzone { padding: 50px 20px; margin-top: 40px; }
      .doc-title { font-size: 22px; }
      .results-header { flex-direction: column; }
      .api-key-input { width: 100%; }
    }
  </style>
</head>
<body>

  <div id="app"></div>
  <div id="toast" class="toast"></div>

  <script>
    // ─── CONFIG ──────────────────────────────────────────────
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const DOC_TYPE_STYLES = {
      clinical_trial:   { bg: '#E8F5E9', text: '#2E7D32', label: 'Clinical Trial' },
      pitch_deck:       { bg: '#E3F2FD', text: '#1565C0', label: 'Pitch Deck' },
      financial_report: { bg: '#FFF3E0', text: '#E65100', label: 'Financial Report' },
      research_paper:   { bg: '#F3E5F5', text: '#6A1B9A', label: 'Research Paper' },
      other:            { bg: '#ECEFF1', text: '#37474F', label: 'Document' },
    };

    const EXTRACTION_PROMPT = `You are a world-class document analyst. You will receive the raw text extracted from a PDF document (clinical trial report, pitch deck, financial filing, or similar).

Your job: extract structured insights and return ONLY valid JSON (no markdown, no backticks, no preamble). The JSON must follow this exact schema:

{
  "document_type": "clinical_trial | pitch_deck | financial_report | research_paper | other",
  "title": "best guess at the document title",
  "executive_summary": "A 3-5 sentence high-level summary of the document's purpose and key conclusions. Write crisply like a McKinsey analyst.",
  "key_metrics": [
    {
      "label": "metric name (e.g. 'Primary Endpoint p-value', 'ARR', 'Total Funding')",
      "value": "the value as stated",
      "context": "one sentence of context or significance"
    }
  ],
  "critical_findings": [
    "Finding 1 — short, punchy, insight-dense sentence",
    "Finding 2",
    "Finding 3"
  ],
  "risks_and_limitations": [
    "Risk or limitation 1",
    "Risk or limitation 2"
  ],
  "one_page_summary": "A ~250 word structured summary suitable for a one-pager. Use clear paragraph breaks. Cover: what the document is, key results/metrics, implications, and what to watch next."
}

Rules:
- Extract EVERY quantitative metric you can find (financial figures, p-values, percentages, sample sizes, timelines, valuations, growth rates).
- If data is ambiguous or missing, say so explicitly in the value field.
- Be opinionated in the summary — state what matters and why.
- Write for a sophisticated reader (PM, investor, or analyst).
- Return ONLY the JSON object. No other text.`;

    // ─── STATE ───────────────────────────────────────────────
    let state = {
      stage: 'upload',  // upload | extracting | analyzing | done | error
      file: null,
      insights: null,
      error: '',
      progress: '',
      pageCount: 0,
      dragOver: false,
      apiKey: localStorage.getItem('ix_api_key') || '',
    };

    function setState(patch) {
      Object.assign(state, patch);
      render();
    }

    // ─── PDF EXTRACTION ──────────────────────────────────────
    async function extractTextFromPDF(file) {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      let fullText = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        const pageText = content.items.map(item => item.str).join(' ');
        fullText += `\n--- Page ${i} ---\n${pageText}`;
      }
      return { text: fullText, pageCount: pdf.numPages };
    }

    // ─── CLAUDE API ──────────────────────────────────────────
    async function analyzeWithClaude(text) {
      const trimmed = text.slice(0, 80000);
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': state.apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 4000,
          messages: [
            { role: 'user', content: EXTRACTION_PROMPT + '\n\n--- DOCUMENT TEXT ---\n' + trimmed }
          ],
        }),
      });

      if (!response.ok) {
        const errBody = await response.json().catch(() => ({}));
        throw new Error(errBody?.error?.message || `API error ${response.status}`);
      }

      const data = await response.json();
      const raw = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
      return JSON.parse(raw.replace(/```json|```/g, '').trim());
    }

    // ─── PROCESS FILE ────────────────────────────────────────
    async function processFile(file) {
      if (!file || file.type !== 'application/pdf') {
        setState({ error: 'Please upload a PDF file.', stage: 'error' });
        return;
      }
      if (!state.apiKey.trim()) {
        setState({ error: 'Please enter your Anthropic API key first.', stage: 'error' });
        return;
      }

      localStorage.setItem('ix_api_key', state.apiKey);
      setState({ file, stage: 'extracting', progress: 'Parsing PDF pages...' });

      try {
        const { text, pageCount } = await extractTextFromPDF(file);
        setState({ pageCount });

        if (text.trim().length < 100) {
          setState({
            error: 'Could not extract enough text. The PDF may be image-based (scanned). Try a text-based PDF.',
            stage: 'error'
          });
          return;
        }

        setState({ stage: 'analyzing', progress: 'Claude is extracting structured insights...' });
        const result = await analyzeWithClaude(text);
        setState({ insights: result, stage: 'done' });
      } catch (err) {
        console.error(err);
        setState({ error: 'Analysis failed: ' + err.message, stage: 'error' });
      }
    }

    // ─── EXPORT PDF ──────────────────────────────────────────
    function exportPDF() {
      const ins = state.insights;
      const ds = DOC_TYPE_STYLES[ins.document_type] || DOC_TYPE_STYLES.other;

      const metrics = ins.key_metrics.map(m => `
        <div style="background:#f8f9fa;padding:14px 18px;border-radius:8px;border-left:4px solid #1a1a2e;margin-bottom:10px;">
          <div style="font-weight:700;font-size:13px;color:#1a1a2e;text-transform:uppercase;letter-spacing:0.5px;">${esc(m.label)}</div>
          <div style="font-size:22px;font-weight:800;color:#0d0d1a;margin:4px 0;">${esc(m.value)}</div>
          <div style="font-size:12px;color:#666;">${esc(m.context)}</div>
        </div>`).join('');

      const findings = ins.critical_findings.map((f, i) => `
        <div style="display:flex;gap:10px;margin-bottom:8px;">
          <span style="font-weight:800;color:#1a1a2e;min-width:20px;">${i+1}.</span>
          <span style="color:#333;">${esc(f)}</span>
        </div>`).join('');

      const html = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>${esc(ins.title)}</title>
      <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap');
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'IBM Plex Sans',sans-serif;padding:40px;color:#1a1a1a;max-width:800px;margin:0 auto;}
        .badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;background:${ds.bg};color:${ds.text};}
        h1{font-size:26px;font-weight:800;margin:16px 0 8px;line-height:1.2;}
        .summary{font-size:15px;line-height:1.7;color:#444;margin:16px 0 28px;padding:16px 20px;background:#fafafa;border-radius:8px;border:1px solid #eee;}
        h2{font-size:14px;text-transform:uppercase;letter-spacing:1.2px;color:#888;font-weight:700;margin:28px 0 14px;}
        .one-pager{font-size:14px;line-height:1.8;color:#333;white-space:pre-wrap;}
        .footer{margin-top:40px;padding-top:16px;border-top:1px solid #eee;font-size:11px;color:#aaa;text-align:center;}
      </style></head><body>
        <div class="badge">${ds.label}</div>
        <h1>${esc(ins.title)}</h1>
        <div class="summary">${esc(ins.executive_summary)}</div>
        <h2>Key Metrics</h2>${metrics}
        <h2>Critical Findings</h2>${findings}
        <h2>One-Page Summary</h2>
        <div class="one-pager">${esc(ins.one_page_summary)}</div>
        <div class="footer">Generated by PDF Insight Extractor &middot; Powered by Claude</div>
      </body></html>`;

      const blob = new Blob([html], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const w = window.open(url, '_blank');
      if (w) w.onload = () => setTimeout(() => w.print(), 500);
    }

    // ─── TOAST ───────────────────────────────────────────────
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2000);
    }

    // ─── HELPERS ─────────────────────────────────────────────
    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    function reset() {
      setState({ stage: 'upload', file: null, insights: null, error: '', progress: '', pageCount: 0 });
    }

    // ─── RENDER ──────────────────────────────────────────────
    function render() {
      const app = document.getElementById('app');
      const { stage, file, insights, error, progress, pageCount, dragOver, apiKey } = state;

      let html = `
        <div class="header">
          <div class="logo">
            <div class="logo-icon">IX</div>
            <div>
              <div class="logo-text">Insight Extractor</div>
              <div class="logo-sub">AI-Powered Document Analysis</div>
            </div>
          </div>
          ${stage === 'done' ? '<button class="btn-secondary" onclick="reset()">&#8592; New Document</button>' : ''}
        </div>
        <div class="main">`;

      // ─── UPLOAD ───
      if (stage === 'upload') {
        html += `
          <div class="dropzone fade-in ${dragOver ? 'drag-over' : ''}" id="dropzone">
            <div class="drop-icon">&#128196;</div>
            <div class="drop-title">Drop your PDF here, or click to browse</div>
            <div class="drop-hint">
              Clinical trial reports &middot; Pitch decks &middot; Financial filings &middot; Research papers<br>
              Claude will extract structured insights, key metrics, and a one-page summary.
            </div>
            <input type="file" id="fileInput" accept="application/pdf" style="display:none">
            <div class="api-key-section">
              <input
                type="password"
                class="api-key-input"
                id="apiKeyInput"
                placeholder="sk-ant-... (your Anthropic API key)"
                value="${esc(apiKey)}"
              >
              ${apiKey ? '<span class="key-saved">&#10003; Saved</span>' : ''}
            </div>
            <div class="api-key-note">
              Your key stays in your browser (localStorage). Need one? <a href="https://console.anthropic.com/settings/keys" target="_blank">Get an API key</a>
            </div>
          </div>`;
      }

      // ─── PROCESSING ───
      if (stage === 'extracting' || stage === 'analyzing') {
        html += `
          <div class="processing fade-in">
            <div class="spinner"></div>
            <div class="processing-title">${stage === 'extracting' ? 'Extracting text from PDF...' : 'Analyzing with Claude...'}</div>
            <div class="processing-sub">${esc(progress)}</div>
            ${file ? `<div class="processing-file">${esc(file.name)} &middot; ${(file.size / 1024).toFixed(0)} KB${pageCount > 0 ? ' &middot; ' + pageCount + ' pages' : ''}</div>` : ''}
          </div>`;
      }

      // ─── ERROR ───
      if (stage === 'error') {
        html += `
          <div class="error-box fade-in">
            <div class="error-icon">&#9888;&#65039;</div>
            <div class="error-text">${esc(error)}</div>
            <button class="btn-primary" onclick="reset()">Try Again</button>
          </div>`;
      }

      // ─── RESULTS ───
      if (stage === 'done' && insights) {
        const ds = DOC_TYPE_STYLES[insights.document_type] || DOC_TYPE_STYLES.other;

        html += `
          <div class="results-header fade-in">
            <div>
              <span class="badge" style="background:${ds.bg};color:${ds.text};">${ds.label}</span>
              <h1 class="doc-title">${esc(insights.title)}</h1>
              <div class="file-meta">
                <span>${esc(file?.name)}</span><span>&middot;</span>
                <span>${pageCount} pages</span><span>&middot;</span>
                <span>${insights.key_metrics?.length || 0} metrics extracted</span>
              </div>
            </div>
            <div class="actions">
              <button class="btn-primary" onclick="exportPDF()">&#8595; Export PDF</button>
              <button class="btn-secondary" onclick="copyJSON()">Copy JSON</button>
            </div>
          </div>

          <div class="fade-in-d1">
            <div class="section-label">Executive Summary</div>
            <div class="summary-box">${esc(insights.executive_summary)}</div>
          </div>

          <div class="fade-in-d2">
            <div class="section-label">Key Metrics (${insights.key_metrics?.length || 0})</div>
            <div class="metrics-grid">
              ${(insights.key_metrics || []).map(m => `
                <div class="metric-card">
                  <div class="metric-label">${esc(m.label)}</div>
                  <div class="metric-value">${esc(m.value)}</div>
                  <div class="metric-context">${esc(m.context)}</div>
                </div>`).join('')}
            </div>
          </div>

          <div class="fade-in-d3">
            <div class="section-label">Critical Findings</div>
            <div style="margin-bottom:36px;">
              ${(insights.critical_findings || []).map((f, i) => `
                <div class="finding-row">
                  <div class="finding-num">${String(i+1).padStart(2,'0')}</div>
                  <div class="finding-text">${esc(f)}</div>
                </div>`).join('')}
            </div>
          </div>

          ${(insights.risks_and_limitations?.length > 0) ? `
          <div class="fade-in-d3">
            <div class="section-label">Risks &amp; Limitations</div>
            <div style="margin-bottom:36px;">
              ${insights.risks_and_limitations.map(r => `
                <div class="finding-row">
                  <div class="finding-num risk-icon">&#9888;</div>
                  <div class="finding-text">${esc(r)}</div>
                </div>`).join('')}
            </div>
          </div>` : ''}

          <div class="fade-in-d4">
            <div class="section-label">One-Page Summary</div>
            <div class="one-pager">${esc(insights.one_page_summary)}</div>
          </div>`;
      }

      html += '</div>';
      app.innerHTML = html;

      // ─── BIND EVENTS ───
      if (stage === 'upload') {
        const dz = document.getElementById('dropzone');
        const fi = document.getElementById('fileInput');
        const ak = document.getElementById('apiKeyInput');

        dz.addEventListener('click', (e) => {
          if (e.target.id !== 'apiKeyInput') fi.click();
        });
        dz.addEventListener('dragover', (e) => { e.preventDefault(); setState({ dragOver: true }); });
        dz.addEventListener('dragleave', () => setState({ dragOver: false }));
        dz.addEventListener('drop', (e) => {
          e.preventDefault();
          state.dragOver = false;
          const f = e.dataTransfer.files?.[0];
          if (f) processFile(f);
        });
        fi.addEventListener('change', (e) => {
          const f = e.target.files?.[0];
          if (f) processFile(f);
        });
        ak.addEventListener('input', (e) => {
          state.apiKey = e.target.value;
          localStorage.setItem('ix_api_key', state.apiKey);
        });
        // Keep focus on the key input
        ak.addEventListener('click', (e) => e.stopPropagation());
      }
    }

    function copyJSON() {
      navigator.clipboard.writeText(JSON.stringify(state.insights, null, 2));
      showToast('JSON copied to clipboard');
    }

    // ─── INIT ────────────────────────────────────────────────
    render();
  </script>
</body>
</html>
